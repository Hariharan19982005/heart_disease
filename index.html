<!DOCTYPE html>
<html lang="en">
<head>
  <title>Heart Disease Prediction</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --card: #161b2e;
      --border: rgba(255,255,255,0.06);
      --red: #e63946;
      --red-glow: rgba(230,57,70,0.25);
      --red-light: #ff6b6b;
      --green: #2ec27e;
      --green-glow: rgba(46,194,126,0.2);
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #4f8ef7;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      overflow-x: hidden;
    }

    /* ── Background pulse rings ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(230,57,70,0.07) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse-bg 4s ease-in-out infinite;
    }
    @keyframes pulse-bg {
      0%,100% { transform: translateX(-50%) scale(1); opacity:0.6; }
      50%      { transform: translateX(-50%) scale(1.15); opacity:1; }
    }

    /* ── ECG line decoration ── */
    .ecg-bar {
      width: 100%;
      max-width: 700px;
      height: 40px;
      margin-bottom: 10px;
      overflow: hidden;
      opacity: 0.35;
    }
    .ecg-bar svg { width: 200%; animation: ecg-scroll 3s linear infinite; }
    @keyframes ecg-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.7s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(230,57,70,0.12);
      border: 1px solid rgba(230,57,70,0.3);
      color: var(--red-light);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 18px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .badge-dot {
      width: 7px; height: 7px;
      background: var(--red);
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -1px;
    }
    h1 span { color: var(--red); }
    .header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      animation: fadeUp 0.8s ease 0.2s both;
      position: relative;
      overflow: hidden;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(230,57,70,0.5), transparent);
    }

    /* ── Section labels ── */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--red-light);
      margin: 28px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media(max-width: 520px) { .grid { grid-template-columns: 1fr; } }

    /* ── Field wrapper ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .field .hint {
      font-size: 10px;
      color: rgba(107,114,128,0.6);
      margin-top: -4px;
    }

    /* ── Input ── */
    input {
      width: 100%;
      padding: 11px 14px;
      margin: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: rgba(107,114,128,0.5); font-size: 13px; }
    input:focus {
      border-color: rgba(230,57,70,0.5);
      background: rgba(230,57,70,0.05);
      box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
    }
    input:hover:not(:focus) { border-color: rgba(255,255,255,0.14); }

    /* ── Button ── */
    .btn-wrap {
      margin-top: 32px;
      display: flex;
      justify-content: center;
    }
    button {
      padding: 14px 48px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 6px 30px rgba(230,57,70,0.35);
    }
    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(230,57,70,0.5);
      background: #f24a56;
    }
    button:active { transform: translateY(0); }

    button .heart-icon { display: inline-block; margin-right: 8px; animation: heartbeat 1.3s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.25); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.15); }
      56%      { transform: scale(1); }
    }

    /* ── Result box ── */
    #result {
      margin-top: 28px;
      font-size: 20px;
      font-weight: bold;
      /* overridden by JS, keep this */
    }
    .result-card {
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
      overflow: hidden;
    }
    @keyframes resultPop {
      from { opacity:0; transform:scale(0.92); }
      to   { opacity:1; transform:scale(1); }
    }
    .result-card.danger {
      background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.3);
    }
    .result-card.safe {
      background: rgba(46,194,126,0.07);
      border: 1px solid rgba(46,194,126,0.3);
    }
    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .result-card.danger .result-title { color: var(--red-light); }
    .result-card.safe  .result-title { color: var(--green); }

    .result-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 500;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
    }
    .result-card.danger .stat-value { color: #fff; }
    .result-card.safe  .stat-value  { color: #fff; }

    /* Progress bar */
    .progress-wrap {
      margin-top: 4px;
    }
    .progress-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .progress-bar-bg {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }
    .result-card.danger .progress-bar-fill { background: linear-gradient(90deg, #e63946, #ff6b6b); }
    .result-card.safe  .progress-bar-fill { background: linear-gradient(90deg, #2ec27e, #5af0b0); }

    /* ── Footer ── */
    .footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.3px;
      animation: fadeUp 1s ease 0.5s both;
    }
    .footer span { color: var(--red); }
  </style>
</head>

<body>

<!-- ECG decorative line -->
<div class="ecg-bar" aria-hidden="true">
  <svg viewBox="0 0 800 40" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="40">
    <polyline points="0,20 60,20 80,20 90,5 100,35 110,5 120,20 140,20 200,20 210,20 220,8 230,32 240,8 250,20 260,20 320,20 330,20 340,8 350,32 360,8 370,20 380,20 440,20 450,20 460,8 470,32 480,8 490,20 500,20 560,20 570,20 580,8 590,32 600,8 610,20 620,20 680,20 690,20 700,8 710,32 720,8 730,20 740,20 800,20"
      stroke="#e63946" stroke-width="1.5" fill="none" opacity="0.8"/>
  </svg>
</div>

<!-- Header -->
<div class="header">
  <div class="badge"><span class="badge-dot"></span> ML Powered Analysis</div>
  <h1>Heart Disease<br/><span>Prediction</span> System</h1>
  <p>Enter patient vitals below to assess cardiovascular risk using our trained model</p>
</div>

<!-- Main card -->
<div class="card">

  <form id="form">

    <div class="section-label">Patient Demographics</div>
    <div class="grid">
      <div class="field">
        <label>Age</label>
        <input id="age" placeholder="e.g. 54" type="number"/>
      </div>
      <div class="field">
        <label>Sex</label>
        <input id="sex" placeholder="1 = Male, 0 = Female" type="number"/>
      </div>
    </div>

    <div class="section-label">Cardiovascular Indicators</div>
    <div class="grid">
      <div class="field">
        <label>Chest Pain Type</label>
        <input id="cp" placeholder="0 – 3" type="number"/>
      </div>
      <div class="field">
        <label>Resting Blood Pressure</label>
        <input id="trestbps" placeholder="mm Hg" type="number"/>
      </div>
      <div class="field">
        <label>Cholesterol</label>
        <input id="chol" placeholder="mg/dL" type="number"/>
      </div>
      <div class="field">
        <label>Fasting Blood Sugar</label>
        <input id="fbs" placeholder="1 = >120 mg/dL, else 0" type="number"/>
      </div>
      <div class="field">
        <label>Resting ECG</label>
        <input id="restecg" placeholder="0, 1, or 2" type="number"/>
      </div>
      <div class="field">
        <label>Max Heart Rate</label>
        <input id="thalach" placeholder="bpm" type="number"/>
      </div>
    </div>

    <div class="section-label">Advanced Diagnostics</div>
    <div class="grid">
      <div class="field">
        <label>Exercise Angina</label>
        <input id="exang" placeholder="1 = Yes, 0 = No" type="number"/>
      </div>
      <div class="field">
        <label>ST Depression (Old Peak)</label>
        <input id="oldpeak" placeholder="e.g. 1.4" type="number" step="0.1"/>
      </div>
      <div class="field">
        <label>ST Slope</label>
        <input id="slope" placeholder="0, 1, or 2" type="number"/>
      </div>
      <div class="field">
        <label>CA (Major Vessels)</label>
        <input id="ca" placeholder="0 – 3" type="number"/>
      </div>
      <div class="field" style="grid-column: span 2;">
        <label>Thal</label>
        <input id="thal" placeholder="1 = Normal, 2 = Fixed Defect, 3 = Reversible Defect" type="number"/>
      </div>
    </div>

    <div class="btn-wrap">
      <button type="submit">
        <span class="heart-icon">❤️</span> Predict Risk
      </button>
    </div>

  </form>

  <!-- Result lives here — untouched ID -->
  <h2 id="result"></h2>

</div>

<div class="footer">Diagnostic AI · <span>♥</span> For research & educational use only</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  let data = {
    age: document.getElementById("age").value,
    sex: document.getElementById("sex").value,
    cp: document.getElementById("cp").value,
    trestbps: document.getElementById("trestbps").value,
    chol: document.getElementById("chol").value,
    fbs: document.getElementById("fbs").value,
    restecg: document.getElementById("restecg").value,
    thalach: document.getElementById("thalach").value,
    exang: document.getElementById("exang").value,
    oldpeak: document.getElementById("oldpeak").value,
    slope: document.getElementById("slope").value,
    ca: document.getElementById("ca").value,
    thal: document.getElementById("thal").value
  };

  // 🔥 Input Validation
  if (data.age <= 0 || data.age > 120) {
    alert("Enter valid age");
    return;
  }

  if (data.chol < 0) {
    alert("Enter valid cholesterol");
    return;
  }

  let res = await fetch("http://127.0.0.1:5000/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  let result = await res.json();

  // 🔥 Show result + probability + accuracy
  let text = result.result == 1
    ? "⚠️ High Risk of Heart Disease"
    : "✅ You are Safe";

  let probability = (result.probability * 100).toFixed(2);
  let accuracy = (result.accuracy * 100).toFixed(2);

  /* ── Enhanced visual result display ── */
  const isDanger = result.result == 1;
  const resultEl = document.getElementById("result");

  resultEl.innerHTML = `
    <div class="result-card ${isDanger ? 'danger' : 'safe'}">
      <div class="result-title">${isDanger ? '⚠️ High Risk of Heart Disease' : '✅ You are Safe'}</div>
      <div class="result-stats">
        <div class="stat">
          <span class="stat-label">Confidence</span>
          <span class="stat-value">${probability}%</span>
        </div>
        <div class="stat">
          <span class="stat-label">Model Accuracy</span>
          <span class="stat-value">${accuracy}%</span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">Confidence Level</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="pbar" style="width:0%"></div>
        </div>
      </div>
    </div>
  `;

  /* Animate progress bar */
  setTimeout(() => {
    document.getElementById("pbar").style.width = probability + "%";
  }, 50);
};
</script>

</body>
</html>
