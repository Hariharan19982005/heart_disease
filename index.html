<!DOCTYPE html>
<html>
<head>
  <title>Heart Disease Prediction</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      color: red;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>❤️ Heart Disease Prediction System</h1>

<form id="form">

  <input id="age" placeholder="Age"><br>
  <input id="sex" placeholder="Sex (1=Male, 0=Female)"><br>
  <input id="cp" placeholder="Chest Pain (0-3)"><br>
  <input id="trestbps" placeholder="Blood Pressure"><br>
  <input id="chol" placeholder="Cholesterol"><br>
  <input id="fbs" placeholder="Fasting Sugar (1/0)"><br>
  <input id="restecg" placeholder="ECG Result (0-2)"><br>
  <input id="thalach" placeholder="Heart Rate"><br>
  <input id="exang" placeholder="Exercise Angina (1/0)"><br>
  <input id="oldpeak" placeholder="Old Peak"><br>
  <input id="slope" placeholder="Slope (0-2)"><br>
  <input id="ca" placeholder="CA (0-3)"><br>
  <input id="thal" placeholder="Thal (1-3)"><br><br>

  <button type="submit">Predict</button>
</form>

<h2 id="result"></h2>

<script>
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  let data = {
    age: document.getElementById("age").value,
    sex: document.getElementById("sex").value,
    cp: document.getElementById("cp").value,
    trestbps: document.getElementById("trestbps").value,
    chol: document.getElementById("chol").value,
    fbs: document.getElementById("fbs").value,
    restecg: document.getElementById("restecg").value,
    thalach: document.getElementById("thalach").value,
    exang: document.getElementById("exang").value,
    oldpeak: document.getElementById("oldpeak").value,
    slope: document.getElementById("slope").value,
    ca: document.getElementById("ca").value,
    thal: document.getElementById("thal").value
  };

  // 🔥 Input Validation
  if (data.age <= 0 || data.age > 120) {
    alert("Enter valid age");
    return;
  }

  if (data.chol < 0) {
    alert("Enter valid cholesterol");
    return;
  }

  let res = await fetch("http://127.0.0.1:5000/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  let result = await res.json();

  // 🔥 Show result + probability + accuracy
  let text = result.result == 1 
    ? "⚠️ High Risk of Heart Disease" 
    : "✅ You are Safe";

  let probability = (result.probability * 100).toFixed(2);
  let accuracy = (result.accuracy * 100).toFixed(2);

  document.getElementById("result").innerText =
    text + "\nConfidence: " + probability + "%" +
    "\nModel Accuracy: " + accuracy + "%";
};
</script>

</body>
</html>
